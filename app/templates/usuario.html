{% extends 'base.html' %}
{% block extra_links %} 
{% endblock %}
{% block content %}
        <section id="user">
            <div class="section-header">
                <h2>Perfil do Usuário</h2>
            </div>
            
            <div class="form-container">
                <form id="profile-form">
                    <div class="form-group">
                        <label for="user-name">Nome</label>
                        <input type="text" id="user-name" value="João Silva">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-email">Email</label>
                        <input type="email" id="user-email" value="joao.silva@exemplo.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-password">Nova Senha (deixe em branco para manter)</label>
                        <input type="password" id="user-password">
                    </div>
                    
                    <div class="form-group">
                        <label for="user-confirm">Confirmar Nova Senha</label>
                        <input type="password" id="user-confirm">
                    </div>
                    
                    <button type="submit" class="btn">Salvar Alterações</button>
                </form>
                
                <div class="mt-2">
                    <h3>Solicitar Acesso</h3>
                    <p>Envie uma solicitação para se tornar colaborador ou administrador do portal.</p>
                    
                    <div class="form-group mt-2">
                        <label for="access-request">Tipo de Acesso</label>
                        <select id="access-request">
                            <option value="editor">Editor de Conteúdo</option>
                            <option value="moderator">Moderador de Artigos</option>
                            <option value="admin">Administrador do Sistema</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="request-message">Mensagem (opcional)</label>
                        <textarea id="request-message"></textarea>
                    </div>
                    
                    <button class="btn btn-outline">Enviar Solicitação</button>
                </div>
            </div>
        </section>
{% endblock %}
{% block extra_scripts %}
<script src="../static/styles/scripts.js"></script>
{% endblock %}
